name: Academic Platform - Regression Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every day at 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      suite:
        description: 'TestNG suite file to run'
        required: false
        default: 'testng.xml'

jobs:
  regression-test:
    name: Run Regression Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: maven

      - name: Install Playwright browsers
        run: mvn exec:java -e -D exec.mainClass=com.microsoft.playwright.CLI -D exec.args="install --with-deps chromium"

      - name: Run Tests
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
          HEADLESS: true
        run: |
          SUITE=${{ github.event.inputs.suite || 'testng.xml' }}
          mvn test -DsuiteFile=$SUITE -B

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report -B

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 7

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
          retention-days: 7

      - name: Publish Test Results Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: TestNG Results
          path: target/surefire-reports/*.xml
          reporter: java-junit
